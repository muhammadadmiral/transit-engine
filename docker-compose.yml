services:
  api:
    build: .
    env_file: .env
    ports:
      - "8000:7860"
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: transit_engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transit_engine"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

