name: Deploy Hugging Face Space

on:
  push:
    branches: [dev, main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install application dependencies
        run: python -m pip install .
      - name: Migrate matching Supabase database
        env:
          DATABASE_URL: ${{ github.ref_name == 'main' && secrets.PROD_DATABASE_URL || secrets.DEV_DATABASE_URL }}
        run: alembic upgrade head
      - name: Install Hugging Face CLI
        run: python -m pip install "huggingface_hub[cli]"
      - name: Select Space
        id: space
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "repo=${{ secrets.HF_PROD_SPACE }}" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${{ secrets.HF_DEV_SPACE }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload current revision
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: >-
          huggingface-cli upload
          ${{ steps.space.outputs.repo }}
          .
          .
          --repo-type space
          --commit-message "Deploy ${{ github.sha }} from ${{ github.ref_name }}"
          --exclude ".git/*"
          --exclude ".env*"
