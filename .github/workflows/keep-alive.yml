name: Keep production Space warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          HF_SPACE_URL: ${{ secrets.HF_PROD_SPACE_URL }}
        run: curl --fail --silent --show-error --max-time 30 "${HF_SPACE_URL}/health"

